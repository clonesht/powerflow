name: Build App

on: [workflow_dispatch]

jobs:
  build-macos:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri DMG
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg

      - name: Inspect generated bundles
        if: always()
        run: |
          find src-tauri/target -type f \( -name '*.dmg' -o -name '*.app' \) -print
          find src-tauri/target -type d -name bundle -print

      - name: Upload Installer Bundle
        uses: actions/upload-artifact@v4
        with:
          name: powerflow-m4-installer
          path: src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: error
